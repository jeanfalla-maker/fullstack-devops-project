services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: appdb
      DB_PORT: 5432
    depends_on:
      - db
    networks:
      - mi_red

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://web:5000
    depends_on:
      - web
    networks:
      - mi_red

  worker:
    build: ./worker
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: appdb
      DB_PORT: 5432
    depends_on:
      - db
    networks:
      - mi_red

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mi_red

volumes:
  db_data:

networks:
  mi_red:
